{% extends "base.html" %}
{% set title = "项目扫描 - 依赖与漏洞分析平台" %}

{% block content %}
<section class="page-intro">
  <div>
    <h1>项目扫描</h1>
    <p>输入项目目录后开始分析，也可以使用示例项目快速查看效果。</p>
  </div>
</section>

<section class="control-panel">
  <label for="projectPath">项目路径</label>
  <div class="control-row">
    <input id="projectPath" type="text" placeholder="输入待扫描项目目录绝对路径" />
    <button id="scanBtn">开始扫描</button>
  </div>
  <div class="control-row secondary">
    <button id="sampleBtn" class="ghost">加载示例项目</button>
    <a class="secondary-link compact" href="/risk">查看风险结果</a>
  </div>
  <p id="statusText" class="status-text">等待分析任务</p>
  <div id="reportActions" class="report-actions"></div>
</section>

<section class="section-block">
  <div class="section-heading">
    <h2>扫描结果概览</h2>
    <p>这里显示最近一次扫描的核心指标。</p>
  </div>
  <div class="stats-grid" id="statsGrid"></div>
  <div class="summary-panel" id="summaryPanel"></div>
</section>
{% endblock %}
