{% extends "base.html" %}
{% set title = "项目扫描" %}

{% block content %}
<section class="page-intro">
  <h1>项目扫描</h1>
</section>

<section class="control-panel">
  <label for="projectPath">项目路径扫描</label>
  <div class="control-row">
    <input id="projectPath" type="text" placeholder="输入待扫描项目目录的绝对路径" />
    <button id="scanBtn">开始扫描</button>
  </div>
  <div class="upload-scan-panel">
    <div>
      <label for="projectFolder">选择项目文件夹</label>
      <input id="projectFolder" type="file" webkitdirectory directory multiple />
    </div>
    <div>
      <label for="projectArchive">或上传 ZIP 项目包</label>
      <input id="projectArchive" type="file" accept=".zip,application/zip" />
    </div>
    <button id="uploadScanBtn" type="button" class="secondary-action">上传并扫描</button>
  </div>
  <div class="control-row secondary">
    <button id="sampleBtn" class="ghost">加载示例项目</button>
    <a class="secondary-link compact" href="/risk">查看风险结果</a>
  </div>
  <p id="statusText" class="status-text">等待分析任务</p>
  <div id="reportActions" class="report-actions"></div>
</section>

<section class="section-block">
  <div class="section-heading">
    <h2>扫描结果概览</h2>
  </div>
  <div class="stats-grid" id="statsGrid"></div>
  <div class="architecture-summary" id="architectureSummary"></div>
  <div class="summary-panel" id="summaryPanel"></div>
</section>
{% endblock %}
