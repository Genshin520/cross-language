{% extends "base.html" %}
{% set title = "传播路径" %}

{% block content %}
<section class="page-intro graph-intro">
  <div>
    <h1>传播路径</h1>
  </div>
  <div class="graph-tools" id="graphTools">
    <button type="button" data-action="fit">适配全图</button>
    <button type="button" data-action="zoom-in">放大</button>
    <button type="button" data-action="zoom-out">缩小</button>
  </div>
</section>

<section class="graph-workbench">
  <section class="graph-main-card">
    <div class="graph-summary-strip" id="graphStats">
      <span>等待载入图谱</span>
    </div>
    <div class="graph-workspace">
      <div id="graphCanvas" class="graph-canvas"></div>
    </div>
  </section>

  <aside class="graph-inspector">
    <article class="graph-panel" id="graphImpactPanel">
      <strong>模块影响展示</strong>
    </article>
    <article class="graph-panel" id="architectureProfile">
      <strong>项目架构识别</strong>
    </article>
    <article class="graph-panel">
      <strong>图例</strong>
      <div class="legend-row vertical" id="graphLegend"></div>
    </article>
    <article class="graph-panel graph-history-panel">
      <strong>历史记录</strong>
      <p id="statusText" class="status-text">等待加载历史记录</p>
      <div id="historyList" class="history-grid graph-history-list"></div>
    </article>
  </aside>
</section>
{% endblock %}
