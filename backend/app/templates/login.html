<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录 - 跨编程语言项目的依赖与漏洞传播分析工具</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body class="login-page" data-page="{{ page }}">
  <main class="login-shell">
    <section class="login-card">
      <div class="login-visual" aria-label="系统登录引导图">
        <div class="login-visual-copy">
          <span>Dependency Security Lab</span>
          <h1>跨编程语言项目的依赖与漏洞传播分析工具</h1>
          <p>登录后进入系统，完成依赖识别、漏洞传播路径分析、上下游影响展示与报告生成。</p>
        </div>
        <svg viewBox="0 0 680 420" role="img" aria-labelledby="loginVisualTitle">
          <title id="loginVisualTitle">依赖安全分析平台登录引导图</title>
          <defs>
            <linearGradient id="loginPanel" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92" />
              <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.9" />
            </linearGradient>
          </defs>
          <rect x="42" y="48" width="596" height="318" rx="32" fill="url(#loginPanel)" stroke="#cbd5e1" />
          <rect x="82" y="86" width="516" height="52" rx="16" fill="#0f172a" />
          <circle cx="118" cy="112" r="7" fill="#ef4444" />
          <circle cx="143" cy="112" r="7" fill="#f59e0b" />
          <circle cx="168" cy="112" r="7" fill="#22c55e" />
          <rect x="214" y="102" width="172" height="18" rx="9" fill="#475569" />
          <g>
            <rect x="106" y="184" width="132" height="66" rx="18" fill="#ffffff" stroke="#cbd5e1" />
            <text x="172" y="212" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="700">服务模块</text>
            <text x="172" y="235" text-anchor="middle" fill="#64748b" font-size="12">Java / Python</text>
            <rect x="274" y="184" width="132" height="66" rx="18" fill="#ffffff" stroke="#cbd5e1" />
            <text x="340" y="212" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="700">依赖组件</text>
            <text x="340" y="235" text-anchor="middle" fill="#64748b" font-size="12">NPM / Maven</text>
            <rect x="442" y="184" width="132" height="66" rx="18" fill="#fef2f2" stroke="#fecaca" />
            <text x="508" y="212" text-anchor="middle" fill="#991b1b" font-size="16" font-weight="700">漏洞风险</text>
            <text x="508" y="235" text-anchor="middle" fill="#b91c1c" font-size="12">CVE / 传播链</text>
          </g>
          <path d="M238 217 C252 217, 260 217, 274 217" fill="none" stroke="#94a3b8" stroke-width="3" />
          <path d="M406 217 C420 217, 428 217, 442 217" fill="none" stroke="#dc2626" stroke-width="3" />
          <rect x="156" y="296" width="368" height="42" rx="16" fill="#f8fafc" stroke="#cbd5e1" />
          <text x="340" y="322" text-anchor="middle" fill="#334155" font-size="15" font-weight="700">登录后进入分析工作台</text>
        </svg>
      </div>

      <div class="auth-panel">
        <div class="auth-tabs" role="tablist" aria-label="登录注册切换">
          <button class="auth-tab active" type="button" data-auth-tab="login">登录</button>
          <button class="auth-tab" type="button" data-auth-tab="register">注册</button>
        </div>

        <form id="loginForm" class="auth-form">
          <h2>欢迎回来</h2>
          <label for="loginAccount">账号</label>
          <input id="loginAccount" name="account" type="text" autocomplete="username" placeholder="用户名或邮箱" required />
          <label for="loginPassword">密码</label>
          <input id="loginPassword" name="password" type="password" autocomplete="current-password" placeholder="请输入密码" required />
          <button type="submit">登录并进入项目</button>
        </form>

        <form id="registerForm" class="auth-form hidden">
          <h2>创建账号</h2>
          <label for="registerUsername">用户名</label>
          <input id="registerUsername" name="username" type="text" autocomplete="username" placeholder="例如 student001" required />
          <label for="registerEmail">邮箱</label>
          <input id="registerEmail" name="email" type="email" autocomplete="email" placeholder="example@email.com" required />
          <label for="registerPassword">密码</label>
          <input id="registerPassword" name="password" type="password" autocomplete="new-password" placeholder="至少 6 位" required />
          <button type="submit">注册并进入项目</button>
        </form>

        <p id="authStatus" class="auth-status">请登录或注册后进入系统。</p>
      </div>
    </section>
  </main>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
